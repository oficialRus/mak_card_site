# После получения сертификата через DNS-challenge замените
# /etc/nginx/sites-available/garmonia-mak.ru на этот конфиг и выполните:
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name garmonia-mak.ru www.garmonia-mak.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name garmonia-mak.ru www.garmonia-mak.ru;

    ssl_certificate /etc/letsencrypt/live/garmonia-mak.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/garmonia-mak.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/mak_card_site/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
